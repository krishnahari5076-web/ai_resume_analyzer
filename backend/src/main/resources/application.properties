# =========================================================
# APPLICATION
# =========================================================
spring.application.name=ai-resume-analyzer-backend
server.port=8080

# =========================================================
# FILE UPLOAD (MULTIPART)
# =========================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =========================================================
# GROQ CONFIGURATION
# Keep the key in the GROQ_API_KEY environment variable.
# =========================================================
groq.api.key=${GROQ_API_KEY:}
groq.api.model=llama-3.3-70b-versatile
groq.api.max-output-tokens=1500
groq.api.temperature=0.3

# =========================================================
# CORS
# Comma separated list of allowed origins for the frontend
# =========================================================
cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,https://ai-resume-analyzer-2-phdx.onrender.com
# =========================================================
# LOGGING
# =========================================================
logging.level.root=INFO
logging.level.com.airesumeanalyzer=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
